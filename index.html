<style>

  }
  .display { font-family: 'Fraunces', serif; }

/* ---------- storage (Firestore-backed: "shared" = one doc everyone can read/write, private = under the signed-in user) ---------- */
async function sGet(key, shared) {
  try {
    if (!db) return null;
    if (shared) {
      const snap = await db.collection('appdata').doc(key).get();
      return snap.exists ? snap.data().json : null;
    }
    if (!S.user) return null;
    const snap = await db.collection('users').doc(S.user.uid).collection('private').doc(key).get();
    return snap.exists ? snap.data().json : null;
  } catch (e) { return null; }
}
async function sSet(key, shared, value) {
  try {
    if (!db) return false;
    if (shared) {
      await db.collection('appdata').doc(key).set({ json: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      return true;
    }
    if (!S.user) return false;
    await db.collection('users').doc(S.user.uid).collection('private').doc(key).set({ json: value });
    return true;
  } catch (e) { return false; }
}

/* ---------- helpers ---------- */
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }
function esc(s) {
  return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}
const TAB_COLORS = ['#FF6B4A', '#14B8A6', '#EC4899', '#7C5CFF', '#FFB020', '#2FB4E5'];
function tabColor(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return TAB_COLORS[Math.abs(h) % TAB_COLORS.length];
}

      creator: 'Priya', members: ['Priya', 'Marcus'], createdAt: now - 4 * 86400000,
      resources: [{ id: uid(), title: 'Notes: Independent vs Dependent Events', type: 'text',
        content: "Two events are independent if one happening tells you nothing about whether the other happens — like two separate coin flips. They're dependent when the outcome of one changes the odds of the other, like drawing two cards from a deck without replacement. A common mix-up: people often treat dependent events as independent when the dependence is small, and independent events as dependent when they notice a coincidence. Try it: what's the chance of drawing two aces in a row from a full deck, with and without putting the first card back?" }],
      posts: []
    }
  ];
}

/* ---------- state ---------- */
const S = {
  user: null, profileName: '', showNameGate: true,
  authMode: 'signin', authForm: { name: '', email: '', password: '' }, authError: '', authLoading: false,
  courses: [], loaded: false, coursesLoaded: false,
  view: 'home', activeCourseId: null, activeTab: 'discussion',
  showCreate: false,
  createForm: { title: '', subject: '', description: '', resourceTitle: '', resourceType: 'text', resourceContent: '' },
  postText: '', replyDrafts: {}, expandedPosts: {},
  readingResourceId: null,
  search: '', notice: '',
  resourceForm: { title: '', type: 'text', content: '' }, showAddResource: false
};

/* ---------- persistence + auth actions ---------- */
async function loadCourses() {
  const coursesRaw = await sGet('courses-data', true);
  if (coursesRaw) {
    try { S.courses = JSON.parse(coursesRaw); } catch (e) { S.courses = seedCourses(); }
  } else {
    S.courses = seedCourses();
    await sSet('courses-data', true, JSON.stringify(S.courses));
  }
  S.coursesLoaded = true;
}

async function init() {
  if (!firebaseReady) { S.loaded = true; render(); return; }
  auth.onAuthStateChanged(async function (user) {
    if (user) {
      S.user = user;
      let profile = null;
      try {
        const snap = await db.collection('users').doc(user.uid).get();
        profile = snap.exists ? snap.data() : null;
      } catch (e) {}
      S.profileName = (profile && profile.name) || user.displayName || (user.email ? user.email.split('@')[0] : 'Member');
      S.showNameGate = false;
    } else {
      S.user = null;
      S.profileName = '';
      S.showNameGate = true;
    }
    S.authLoading = false;
    if (!S.coursesLoaded) await loadCourses();
    S.loaded = true;
    render();
  });
}

async function persist() {
  render();
  const ok = await sSet('courses-data', true, JSON.stringify(S.courses));
  if (!ok) { S.notice = "Couldn't save that change — it may not stick around."; render(); }
}

function switchAuthMode(mode) {
  S.authMode = mode;
  S.authError = '';
  render();
}

function friendlyAuthError(e) {
  const code = (e && e.code) || '';
  if (code.indexOf('email-already-in-use') !== -1) return 'That email already has an account — try logging in instead.';
  if (code.indexOf('user-not-found') !== -1 || code.indexOf('wrong-password') !== -1 || code.indexOf('invalid-credential') !== -1 || code.indexOf('invalid-login-credentials') !== -1) return 'Incorrect email or password.';
  if (code.indexOf('invalid-email') !== -1) return 'That email address looks invalid.';
  if (code.indexOf('weak-password') !== -1) return 'Password must be at least 6 characters.';
  if (code.indexOf('too-many-requests') !== -1) return 'Too many attempts — please wait a moment and try again.';
  return (e && e.message) || 'Something went wrong. Please try again.';
}

async function doSignUp() {
  const f = S.authForm;
  const name = f.name.trim(), email = f.email.trim(), pw = f.password;
  if (!name || !email || !pw) { S.authError = 'Fill in your name, email, and password.'; render(); return; }
  if (pw.length < 6) { S.authError = 'Password must be at least 6 characters.'; render(); return; }
  S.authError = ''; S.authLoading = true; render();
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pw);
    await cred.user.updateProfile({ displayName: name });
    await db.collection('users').doc(cred.user.uid).set({
      name: name, email: email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // onAuthStateChanged picks up the rest and re-renders
  } catch (e) {
    S.authError = friendlyAuthError(e);
    S.authLoading = false;
    render();
  }
}

async function doSignIn() {
  const f = S.authForm;
  const email = f.email.trim(), pw = f.password;
  if (!email || !pw) { S.authError = 'Enter your email and password.'; render(); return; }
  S.authError = ''; S.authLoading = true; render();
  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch (e) {
    S.authError = friendlyAuthError(e);
    S.authLoading = false;
    render();
  }
}

async function doLogout() {
  S.authForm = { name: '', email: '', password: '' };
  S.authError = '';
  await auth.signOut();
}

function openCourse(id) { S.activeCourseId = id; S.view = 'classroom'; S.activeTab = 'discussion'; S.showAddResource = false; render(); }
function backHome() { S.view = 'home'; S.activeCourseId = null; render(); }
function setTab(t) { S.activeTab = t; render(); }

function createCourse() {
  const f = S.createForm;
  if (!f.title.trim()) return;
  const course = {
    id: uid(), title: f.title.trim(), subject: f.subject.trim() || 'General', description: f.description.trim(),
    creator: S.profileName, members: [S.profileName], createdAt: Date.now(),
    resources: f.resourceTitle.trim() ? [{ id: uid(), title: f.resourceTitle.trim(), type: f.resourceType, content: f.resourceContent.trim() }] : [],
    posts: []
  };
  S.courses = [course, ...S.courses];
  S.createForm = { title: '', subject: '', description: '', resourceTitle: '', resourceType: 'text', resourceContent: '' };
  S.showCreate = false;
  persist();
  openCourse(course.id);
}

function joinCourse(id) {
  S.courses = S.courses.map(c => c.id === id && !c.members.includes(S.profileName) ? Object.assign({}, c, { members: c.members.concat([S.profileName]) }) : c);
  persist();
}

function addPost() {
  const text = S.postText.trim();
  if (!text || !S.activeCourseId) return;
  S.courses = S.courses.map(c => {
    if (c.id !== S.activeCourseId) return c;
    const post = { id: uid(), author: S.profileName, text: text, createdAt: Date.now(), replies: [] };
    return Object.assign({}, c, { posts: [post].concat(c.posts) });
  });
  S.postText = '';
  persist();
}

function addReply(postId) {
  const text = (S.replyDrafts[postId] || '').trim();
  if (!text) return;
  S.courses = S.courses.map(c => {
    if (c.id !== S.activeCourseId) return c;
    return Object.assign({}, c, { posts: c.posts.map(p => p.id === postId ? Object.assign({}, p, { replies: p.replies.concat([{ id: uid(), author: S.profileName, text: text, createdAt: Date.now() }]) }) : p) });
  });
  S.replyDrafts[postId] = '';
  persist();
}

function addResource() {
  const f = S.resourceForm;
  if (!f.title.trim() || !f.content.trim()) return;
  S.courses = S.courses.map(c => {
    if (c.id !== S.activeCourseId) return c;
    return Object.assign({}, c, { resources: c.resources.concat([{ id: uid(), title: f.title.trim(), type: f.type, content: f.content.trim() }]) });
  });
  S.resourceForm = { title: '', type: 'text', content: '' };
  S.showAddResource = false;
  persist();
}

/* ---------- render helpers (each returns HTML string) ---------- */
function renderNameGate() {
  if (!S.showNameGate) return '';
  const f = S.authForm;
  const isSignUp = S.authMode === 'signup';
  const submitFn = isSignUp ? 'doSignUp' : 'doSignIn';
  return '<div class="name-gate"><div class="name-card">' +
    ic('cap', 36, 'var(--brass)') +
    '<h2>Welcome to The Commons</h2>' +
    '<p>A shared classroom where anyone can start or join a course and learn together.</p>' +
    '<div class="auth-tabs">' +
      '<button type="button" class="auth-tab' + (!isSignUp ? ' active' : '') + '" onclick="switchAuthMode(\'signin\')">Log in</button>' +
      '<button type="button" class="auth-tab' + (isSignUp ? ' active' : '') + '" onclick="switchAuthMode(\'signup\')">Sign up</button>' +
    '</div>' +
    (isSignUp ? '<input class="input" placeholder="Your name" value="' + esc(f.name) + '" oninput="S.authForm.name=this.value" style="margin-top:14px" />' : '<div style="margin-top:14px"></div>') +
    '<input class="input" type="email" autocomplete="email" placeholder="Email" value="' + esc(f.email) + '" oninput="S.authForm.email=this.value" style="margin-top:10px" />' +
    '<input class="input" type="password" autocomplete="' + (isSignUp ? 'new-password' : 'current-password') + '" placeholder="Password" value="' + esc(f.password) + '" oninput="S.authForm.password=this.value" onkeydown="if(event.key===\'Enter\')' + submitFn + '()" style="margin-top:10px" />' +
    (S.authError ? '<p class="auth-error">' + esc(S.authError) + '</p>' : '') +
    '<div style="margin-top:16px"><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="' + submitFn + '()" ' + (S.authLoading ? 'disabled' : '') + '>' + ic('logIn', 16) + ' ' + (S.authLoading ? 'Please wait…' : (isSignUp ? 'Create account' : 'Log in')) + '</button></div>' +
    '</div></div>';
}

function renderSetupNotice() {
  return '<div class="name-gate"><div class="name-card" style="text-align:left;max-width:460px">' +
    '<div style="text-align:center">' + ic('cap', 36, 'var(--brass)') + '</div>' +
    '<h2 style="text-align:center">Firebase setup needed</h2>' +
    '<p>Accounts and data are powered by Firebase, but this page doesn\'t have a project connected yet.</p>' +
    '<p class="hint" style="font-style:normal;line-height:1.6">Open <span class="mono">index.html</span>, find <span class="mono">FIREBASE_CONFIG</span> near the top of the script, and paste in your Firebase project\'s web config (from the Firebase console → Project settings → Your apps). Setup steps are in an HTML comment right above the <span class="mono">&lt;div id="root"&gt;</span> tag.</p>' +
    '</div></div>';
}

function renderHeader() {
  return '<div class="header"><div class="brand">' + ic('book', 26, 'var(--brass)') +
    '<div><div class="brand-title display">The Commons</div><div class="brand-tag">learn it together</div></div></div>' +
    (S.profileName ? '<div style="display:flex;align-items:center;gap:10px"><div class="profile-pill">' + esc(S.profileName) + '</div>' +
      '<button class="btn btn-outline btn-sm" onclick="doLogout()">' + ic('logOut', 14) + ' Log out</button></div>' : '') + '</div>';
}

function courseCard(c) {
  const joined = c.members.includes(S.profileName);
  return '<div class="index-card" onclick="openCourse(\'' + c.id + '\')">' +
    '<div class="index-tab" style="background:' + tabColor(c.subject) + '"></div>' +
    '<div class="index-body">' +
    '<div class="index-subject" style="color:' + tabColor(c.subject) + '">' + esc(c.subject) + '</div>' +
    '<div class="index-title">' + esc(c.title) + '</div>' +
    '<div class="index-desc">' + esc(c.description || 'No description yet.') + '</div>' +
    '<div class="index-foot"><div class="index-members">' + ic('users', 13) + ' ' + c.members.length + ' learning</div>' +
    (joined ? '<span class="mono" style="color:var(--moss);font-weight:600">joined ✓</span>' :
      '<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();joinCourse(\'' + c.id + '\')">Join</button>') +
    '</div></div></div>';
}

function renderHome() {
  const q = S.search.trim().toLowerCase();
  const filtered = S.courses.filter(c => !q || c.title.toLowerCase().includes(q) || c.subject.toLowerCase().includes(q) || c.description.toLowerCase().includes(q));
  let html = '<div class="toolbar"><div class="search-box">' + ic('search', 16, 'var(--ink-soft)') +
    '<input id="searchInput" placeholder="Search courses by title, subject, or topic…" value="' + esc(S.search) + '" oninput="onSearchInput(this.value)" /></div>' +
    '<button class="btn btn-primary" onclick="S.showCreate=true;render()">' + ic('plus', 16) + ' Start a course</button></div>';
  if (!S.loaded) { html += '<div class="empty-state">Opening the reading room…</div>'; return html; }
  if (filtered.length === 0) {
    html += '<div class="empty-state">' + ic('book', 30, 'var(--ink-soft)') + '<p style="margin-top:10px">No courses match yet. Start one — someone will join.</p></div>';
  }
  html += '<div class="grid" id="courseGrid">' + filtered.map(courseCard).join('') + '</div>';
  return html;
}

function onSearchInput(v) {
  S.search = v;
  const grid = document.getElementById('courseGrid');
  const q = v.trim().toLowerCase();
  const filtered = S.courses.filter(c => !q || c.title.toLowerCase().includes(q) || c.subject.toLowerCase().includes(q) || c.description.toLowerCase().includes(q));
  if (grid) {
    grid.innerHTML = filtered.map(courseCard).join('');
  } else {
    render();
  }
}

function renderClassroom() {
  const c = S.courses.find(x => x.id === S.activeCourseId);
  if (!c) { S.view = 'home'; return renderHome(); }
  let html = '<div class="back-link" onclick="backHome()">' + ic('arrowLeft', 15) + ' All courses</div>';
  html += '<div class="classroom-head"><div>' +
    '<div class="index-subject" style="color:' + tabColor(c.subject) + '">' + esc(c.subject) + '</div>' +
    '<div class="classroom-title">' + esc(c.title) + '</div>' +
    '<div class="classroom-desc">' + esc(c.description) + '</div>' +
    '<div class="classroom-meta"><span>' + ic('users', 13) + ' ' + esc(c.members.join(', ')) + '</span>' +
    '<span class="mono">started by ' + esc(c.creator) + '</span></div></div>';
  if (!c.members.includes(S.profileName)) {
    html += '<button class="btn btn-primary" onclick="joinCourse(\'' + c.id + '\')">' + ic('logIn', 16) + ' Join this course</button>';
  }
  html += '</div>';

  html += '<div class="tabs">' +
    '<button class="tab-btn ' + (S.activeTab === 'discussion' ? 'active' : '') + '" onclick="setTab(\'discussion\')">' + ic('message', 15) + ' Discussion</button>' +
    '<button class="tab-btn ' + (S.activeTab === 'library' ? 'active' : '') + '" onclick="setTab(\'library\')">' + ic('library', 15) + ' Library</button>' +
    '</div>';

  if (S.activeTab === 'discussion') html += renderDiscussion(c);
  else html += renderLibrary(c);

  return html;
}

function renderDiscussion(c) {
  let html = '<div class="ruled-paper"><div class="post-form">' +
    '<textarea class="input textarea" id="postInput" placeholder="Ask a question or start a discussion for the class…" oninput="S.postText=this.value">' + esc(S.postText) + '</textarea>' +
    '<button class="btn btn-primary" style="height:44px;align-self:flex-start" onclick="addPost()" ' + (S.postText.trim() ? '' : 'disabled') + '>' + ic('send', 15) + '</button></div>';

  if (c.posts.length === 0) html += '<div class="empty-state" style="padding:30px 10px">No discussion yet — ask the first question.</div>';

  c.posts.forEach(p => {
    const isOpen = !!S.expandedPosts[p.id];
    html += '<div class="post"><span class="post-author">' + esc(p.author) + '</span><span class="post-time">' + timeAgo(p.createdAt) + '</span>' +
      '<div class="post-text">' + esc(p.text) + '</div>' +
      '<div class="post-actions"><span class="reply-toggle" onclick="togglePost(\'' + p.id + '\')">' + ic(isOpen ? 'chevronUp' : 'chevronDown', 14) + ' ' + p.replies.length + ' ' + (p.replies.length === 1 ? 'reply' : 'replies') + '</span></div>';
    if (isOpen) {
      if (p.replies.length > 0) {
        html += '<div class="replies">' + p.replies.map(r =>
          '<div class="reply"><span class="reply-author">' + esc(r.author) + '</span><span class="post-time">' + timeAgo(r.createdAt) + '</span><div class="reply-text">' + esc(r.text) + '</div></div>'
        ).join('') + '</div>';
      }
      html += '<div class="reply-form"><input class="input" placeholder="Write a reply…" value="' + esc(S.replyDrafts[p.id] || '') + '" oninput="S.replyDrafts[\'' + p.id + '\']=this.value" onkeydown="if(event.key===\'Enter\')addReply(\'' + p.id + '\')" />' +
        '<button class="btn btn-outline btn-sm" onclick="addReply(\'' + p.id + '\')" ' + ((S.replyDrafts[p.id] || '').trim() ? '' : 'disabled') + '>Reply</button></div>';
    }
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function togglePost(id) { S.expandedPosts[id] = !S.expandedPosts[id]; render(); }

function renderLibrary(c) {
  let html = '<div><div class="resource-list">';
  if (c.resources.length === 0) html += '<div class="empty-state" style="padding:30px 10px">No readings added yet.</div>';
  c.resources.forEach(r => {
    html += '<div class="resource-item" onclick="openReading(\'' + r.id + '\')"><div class="resource-icon">' + ic(r.type === 'link' ? 'link' : 'fileText', 16) + '</div>' +
      '<div><div class="resource-title">' + esc(r.title) + '</div><div class="resource-sub">' + (r.type === 'link' ? 'External link' : 'Reading') + '</div></div></div>';
  });
  html += '</div>';

  if (!S.showAddResource) {
    html += '<button class="btn btn-outline btn-sm" style="margin-top:16px" onclick="S.showAddResource=true;render()">' + ic('plus', 14) + ' Add a reading or link</button>';
  } else {
    const f = S.resourceForm;
    html += '<div class="modal" style="margin-top:16px;box-shadow:none;max-width:none"><div class="modal-body">' +
      '<div><label class="field-label">Title</label><input class="input" value="' + esc(f.title) + '" oninput="S.resourceForm.title=this.value" placeholder="e.g. Chapter 3 notes, or a source link" /></div>' +
      '<div class="radio-row"><label><input type="radio" name="restype" ' + (f.type === 'text' ? 'checked' : '') + ' onchange="S.resourceForm.type=\'text\';render()" /> Pasted text</label>' +
      '<label><input type="radio" name="restype" ' + (f.type === 'link' ? 'checked' : '') + ' onchange="S.resourceForm.type=\'link\';render()" /> Link</label></div>' +
      (f.type === 'text'
        ? '<textarea class="input textarea" placeholder="Paste the reading here…" oninput="S.resourceForm.content=this.value">' + esc(f.content) + '</textarea>'
        : '<input class="input" placeholder="https://…" value="' + esc(f.content) + '" oninput="S.resourceForm.content=this.value" />') +
      '<div style="display:flex;gap:10px"><button class="btn btn-primary btn-sm" onclick="addResource()">Add to library</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="S.showAddResource=false;render()">Cancel</button></div>' +
      '</div></div>';
  }
  html += '</div>';
  return html;
}

function openReading(id) { S.readingResourceId = id; render(); }
function closeReading() { S.readingResourceId = null; render(); }

function renderReadingModal() {
  if (!S.readingResourceId) return '';
  let resource = null;
  S.courses.some(c => { const r = c.resources.find(x => x.id === S.readingResourceId); if (r) { resource = r; return true; } return false; });
  if (!resource) return '';
  const body = resource.type === 'link'
    ? '<a class="reading-link" href="' + esc(resource.content) + '" target="_blank" rel="noopener noreferrer">' + esc(resource.content) + '</a>'
    : '<div class="reading-text">' + esc(resource.content) + '</div>';
  return '<div class="modal-overlay reading-modal" onclick="closeReading()"><div class="modal" onclick="event.stopPropagation()">' +
    '<div class="modal-head"><h3>' + esc(resource.title) + '</h3><button class="btn-ghost" onclick="closeReading()">' + ic('x', 18) + '</button></div>' +
    '<div class="modal-body">' + body + '</div></div></div>';
}

function renderCreateModal() {
  if (!S.showCreate) return '';
  const f = S.createForm;
  let html = '<div class="modal-overlay" onclick="S.showCreate=false;render()"><div class="modal" onclick="event.stopPropagation()">' +
    '<div class="modal-head"><h3>Start a course</h3><button class="btn-ghost" onclick="S.showCreate=false;render()">' + ic('x', 18) + '</button></div>' +
    '<div class="modal-body">' +
    '<div><label class="field-label">Course title</label><input class="input" id="courseTitleInput" placeholder="e.g. The Fall of Rome" value="' + esc(f.title) + '" oninput="S.createForm.title=this.value;syncCreateBtn()" /></div>' +
    '<div><label class="field-label">Subject</label><input class="input" placeholder="History, Math, Literature…" value="' + esc(f.subject) + '" oninput="S.createForm.subject=this.value" /></div>' +
    '<div><label class="field-label">What will people learn?</label><textarea class="input textarea" placeholder="A short description for the course card" oninput="S.createForm.description=this.value">' + esc(f.description) + '</textarea></div>' +
    '<div><label class="field-label">First reading (optional)</label>' +
    '<input class="input" placeholder="Title, e.g. \'Week 1 overview\'" value="' + esc(f.resourceTitle) + '" oninput="S.createForm.resourceTitle=this.value;render()" style="margin-bottom:10px" />';
  if (f.resourceTitle.trim()) {
    html += '<div class="radio-row" style="margin-bottom:8px"><label><input type="radio" name="cresType" ' + (f.resourceType === 'text' ? 'checked' : '') + ' onchange="S.createForm.resourceType=\'text\';render()" /> Pasted text</label>' +
      '<label><input type="radio" name="cresType" ' + (f.resourceType === 'link' ? 'checked' : '') + ' onchange="S.createForm.resourceType=\'link\';render()" /> Link</label></div>';
    html += f.resourceType === 'text'
      ? '<textarea class="input textarea" placeholder="Paste reading text…" oninput="S.createForm.resourceContent=this.value">' + esc(f.resourceContent) + '</textarea>'
      : '<input class="input" placeholder="https://…" value="' + esc(f.resourceContent) + '" oninput="S.createForm.resourceContent=this.value" />';
  }
  html += '</div>' +
    '<p class="hint">This course will be visible to everyone in the Commons.</p>' +
    '<button class="btn btn-primary" id="createCourseBtn" style="justify-content:center" onclick="createCourse()" ' + (f.title.trim() ? '' : 'disabled') + '>' + ic('plus', 16) + ' Create course</button>' +
    '</div></div></div>';
  return html;
}
function syncCreateBtn() {
  const btn = document.getElementById('createCourseBtn');
  if (btn) btn.disabled = !S.createForm.title.trim();
}

/* ---------- root render with focus preservation ---------- */
function render() {
  const root = document.getElementById('root');
  if (!firebaseReady) { root.innerHTML = '<div class="app-root">' + renderSetupNotice() + '</div>'; return; }
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const selStart = active && 'selectionStart' in active ? active.selectionStart : null;
  const selEnd = active && 'selectionEnd' in active ? active.selectionEnd : null;

  let html = '<div class="app-root">';
  html += renderNameGate();
  if (S.notice) html += '<div class="notice-bar">' + esc(S.notice) + '</div>';
  html += renderHeader();
  html += '<div class="container">' + (S.view === 'home' ? renderHome() : renderClassroom()) + '</div>';
  html += renderCreateModal();
  html += renderReadingModal();
  html += '</div>';

  root.innerHTML = html;

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
}

init();
</script>
</body>
</html>
